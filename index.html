<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>房屋租赁合同生成器</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script defer src="main.js"></script>

  <style>
    body {
      font-family: Arial, "Noto Sans SC";
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
    }

    .example {
      background: #f5f5f5;
      padding: 10px;
      border: 1px dashed #aaa;
      margin-bottom: 10px;
      white-space: pre-line;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    td {
      border: 1px solid #ccc;
      padding: 8px;
    }

    input {
      width: 100%;
      padding: 5px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
    }
  </style>
</head>

<body>

<h2>智能识别输入</h2>

<div class="example">
示例（可直接复制）：

居住地址: 东京XX公寓101  
入住日期: 2026 年 1 月 1 日  
退房日期: 2026 年 5 月 1 日  
签约日期: 2026 年 1 月 1 日  
每月租金: 5000  
姓名: 张三  
证件号码: A12345678
</div>

<textarea id="rawInput"></textarea>
<button onclick="parseInput()">自动识别并填充</button>

<h2>基础信息</h2>

<table>
<tr><td>居住地址</td><td><input id="address"></td></tr>
<tr><td>入住日期</td><td><input id="checkin"></td></tr>
<tr><td>退房日期</td><td><input id="checkout"></td></tr>
<tr><td>签约日期</td><td><input id="signDate"></td></tr>
<tr><td>每月租金</td><td><input id="rent"></td></tr>
<tr><td>姓名</td><td><input id="name"></td></tr>
<tr><td>证件号码</td><td><input id="idNumber"></td></tr>
</table>

<h2>自动计算信息</h2>

<table>
<tr><td>居住时期</td><td><input id="period"></td></tr>
<tr><td>保证金</td><td><input id="deposit"></td></tr>
<tr><td>保证金支付截止日期</td><td><input id="depositDeadline"></td></tr>

<tr><td>第一期截止</td><td><input id="p1Date"></td></tr>
<tr><td>第二期截止</td><td><input id="p2Date"></td></tr>
<tr><td>第三期截止</td><td><input id="p3Date"></td></tr>
<tr><td>第四期截止</td><td><input id="p4Date"></td></tr>

<tr><td>第一期租金</td><td><input id="p1Rent"></td></tr>
<tr><td>第二期租金</td><td><input id="p2Rent"></td></tr>
<tr><td>第三期租金</td><td><input id="p3Rent"></td></tr>
<tr><td>第四期租金</td><td><input id="p4Rent"></td></tr>
</table>

<button onclick="generatePDF()">生成合同 PDF</button>

</body>
</html>
