<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>许可协议 PDF 生成器</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script defer src="main.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, "Microsoft JhengHei", "Microsoft YaHei", sans-serif;
      padding: 24px;
      max-width: 980px;
      margin: auto;
      background: #f7f7f7;
      color: #111;
    }
    h2 { margin: 22px 0 12px; }
    textarea {
      width: 100%;
      height: 150px;
      padding: 10px;
      border: 1px solid #bbb;
      border-radius: 6px;
      background: #fff;
      font-size: 14px;
    }
    .example, .panel {
      background: #fff;
      padding: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 14px;
      white-space: pre-line;
      font-size: 14px;
    }
    table.form-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      margin-top: 8px;
    }
    .form-table td {
      border: 1px solid #ddd;
      padding: 8px;
    }
    .form-table td:first-child {
      width: 180px;
      background: #fafafa;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 7px;
      border: 1px solid #bbb;
      border-radius: 4px;
      font-size: 14px;
    }
    button {
      margin-top: 10px;
      padding: 12px;
      width: 100%;
      border: 0;
      border-radius: 6px;
      background: #222;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }
    button.secondary { background: #666; }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>

<h2>智能识别输入</h2>
<div class="example">示例（可直接复制）：

居住地址: 香港中环XX大厦101
入住日期: 2026 年 1 月 1 日
退房日期: 2026 年 5 月 1 日
签约日期: 2026 年 1 月 1 日
每月租金: 5000
姓名: 张三
证件号码: A12345678</div>

<textarea id="rawInput" placeholder="请把客户资料粘贴在这里"></textarea>
<button onclick="parseInput()">自动识别并填充</button>

<h2>基础信息</h2>
<table class="form-table">
<tr><td>居住地址</td><td><input id="address"></td></tr>
<tr><td>入住日期</td><td><input id="checkin" placeholder="YYYY-MM-DD"></td></tr>
<tr><td>退房日期</td><td><input id="checkout" placeholder="YYYY-MM-DD"></td></tr>
<tr><td>签约日期</td><td><input id="signDate" placeholder="YYYY-MM-DD"></td></tr>
<tr><td>每月租金</td><td><input id="rent" placeholder="例如 5000"></td></tr>
<tr><td>姓名</td><td><input id="name"></td></tr>
<tr><td>证件号码</td><td><input id="idNumber"></td></tr>
</table>

<h2>自动计算信息</h2>
<table class="form-table">
<tr><td>居住时期</td><td><input id="period"></td></tr>
<tr><td>总居住月份</td><td><input id="totalMonths"></td></tr>
<tr><td>保证金</td><td><input id="deposit"></td></tr>
<tr><td>总许可费用</td><td><input id="totalFee"></td></tr>
<tr><td>保证金支付截止日期</td><td><input id="depositDeadline"></td></tr>
<tr><td>第一期截止</td><td><input id="p1Date"></td></tr>
<tr><td>第二期截止</td><td><input id="p2Date"></td></tr>
<tr><td>第三期截止</td><td><input id="p3Date"></td></tr>
<tr><td>第四期截止</td><td><input id="p4Date"></td></tr>
<tr><td>第一期租金</td><td><input id="p1Rent"></td></tr>
<tr><td>第二期租金</td><td><input id="p2Rent"></td></tr>
<tr><td>第三期租金</td><td><input id="p3Rent"></td></tr>
<tr><td>第四期租金</td><td><input id="p4Rent"></td></tr>
</table>

<button onclick="generatePDF()">生成合同 PDF</button>
<button class="secondary" onclick="previewContract()">预览合同排版</button>

<div id="previewArea"></div>

</body>
</html>
